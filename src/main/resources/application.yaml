spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/postgres}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:placeholder-db-password}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

app:
  jwt:
    secret: ${JWT_SECRET:placeholder-jwt-secret-at-least-32-characters-long}
    expiration-ms: ${JWT_EXPIRATION_MS:86400000}
    refresh-expiration-ms: ${JWT_REFRESH_EXPIRATION_MS:604800000}
  supabase:
    url: ${SUPABASE_URL:https://placeholder-supabase.supabase.co}
    service-role-key: ${SUPABASE_SERVICE_ROLE_KEY:placeholder-supabase-service-role-key}
    storage-bucket-resumes: ${SUPABASE_BUCKET_RESUMES:resumes}
    storage-bucket-logos: ${SUPABASE_BUCKET_LOGOS:logos}
  frontend-url: ${FRONTEND_URL:http://localhost:5173}

server:
  port: ${PORT:8080}
